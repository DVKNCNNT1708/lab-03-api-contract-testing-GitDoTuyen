name: Newman Contract Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  newman:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint OpenAPI contracts
        run: npm run lint:contracts

      - name: Start Prism mock servers
        run: |
          nohup npm run mock:iot > prism-iot.log 2>&1 &
          nohup npm run mock:vision > prism-vision.log 2>&1 &
          nohup npm run mock:core > prism-core.log 2>&1 &

      - name: Wait for mock servers
        run: npx wait-on http://localhost:4010/health http://localhost:4011/health http://localhost:4060/api/v1/core-business/health --timeout 30000

      - name: Run Newman - IoT collection (mock)
        run: npm run test:mock

      - name: Run Newman - Core Business collection (mock)
        run: npm run test:core:mock

      - name: Show Prism logs on failure
        if: failure()
        run: |
          cat prism-iot.log || true
          cat prism-vision.log || true
          cat prism-core.log || true

      - name: Upload Newman reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-reports
          path: reports/
