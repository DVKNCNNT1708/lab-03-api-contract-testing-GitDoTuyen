name: Newman Contract Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  newman:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint OpenAPI contracts
        run: npx @stoplight/spectral-cli lint contracts/*.yaml --fail-severity error || true

      - name: Start Prism mock - Core Business (port 4060)
        run: nohup npx prism mock contracts/team-core.openapi.yaml -p 4060 --host 0.0.0.0 > prism-core.log 2>&1 &

      - name: Start Prism mock - AI Vision (port 4011)
        run: nohup npx prism mock contracts/ai-vision.openapi.yaml -p 4011 --host 0.0.0.0 > prism-vision.log 2>&1 &

      - name: Wait for Core Business mock to be ready
        run: npx wait-on http://localhost:4060/api/v1/core-business/health --timeout 60000

      - name: Wait for AI Vision mock to be ready
        run: npx wait-on http://localhost:4011/health --timeout 60000

      - name: Run Newman - Core Business collection (mock environment)
        run: |
          npx newman run postman/collections/team-core.postman_collection.json \
            -e postman/environments/team-core_mock.postman_environment.json \
            --reporters cli,junit,htmlextra \
            --reporter-junit-export reports/team-core-newman-mock.xml \
            --reporter-htmlextra-export reports/team-core-newman-mock.html

      - name: Show Prism logs on failure
        if: failure()
        run: |
          echo "=== prism-core.log ===" && cat prism-core.log || true
          echo "=== prism-vision.log ===" && cat prism-vision.log || true

      - name: Upload Newman reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-reports-team-core
          path: reports/
